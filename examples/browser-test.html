<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llm-hub 浏览器测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { margin-bottom: 20px; color: #333; }
    .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 15px; color: #555; font-size: 16px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; color: #666; }
    select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
    textarea { min-height: 100px; resize: vertical; }
    button { padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #4338ca; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #6b7280; }
    .btn-secondary:hover { background: #4b5563; }
    #output { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 15px; min-height: 100px; white-space: pre-wrap; font-family: monospace; font-size: 13px; }
    .status { padding: 10px; border-radius: 6px; margin-bottom: 15px; }
    .status.success { background: #d1fae5; color: #065f46; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status.info { background: #dbeafe; color: #1e40af; }
    .provider-info { display: flex; gap: 10px; flex-wrap: wrap; }
    .provider-badge { padding: 5px 10px; background: #e5e7eb; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 llm-hub 浏览器测试</h1>
    
    <div class="card">
      <h2>1. 已注册供应商</h2>
      <div id="providers" class="provider-info">加载中...</div>
    </div>

    <div class="card">
      <h2>2. 配置 API Key</h2>
      <label>选择供应商</label>
      <select id="providerSelect">
        <option value="">请选择...</option>
      </select>
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="输入 API Key">
      <label>Base URL (可选)</label>
      <input type="text" id="baseUrl" placeholder="默认地址">
      <button onclick="saveConfig()">保存配置</button>
      <div id="configStatus"></div>
    </div>

    <div class="card">
      <h2>3. 测试对话</h2>
      <label>选择模型</label>
      <select id="modelSelect">
        <option value="">请先配置供应商...</option>
      </select>
      <label>消息</label>
      <textarea id="message" placeholder="输入消息...">你好，请用一句话介绍自己</textarea>
      <button onclick="sendChat()" id="sendBtn">发送</button>
      <button onclick="sendChatStream()" id="streamBtn" class="btn-secondary">流式发送</button>
      <div id="chatStatus"></div>
      <label>输出</label>
      <div id="output">等待发送...</div>
    </div>
  </div>

  <script type="module">
    // 动态导入 llm-hub
    // 注意：实际使用时需要通过构建工具或 CDN 导入
    // 这里我们模拟一个简化的测试环境
    
    // 模拟数据
    const providers = [
      { name: 'openai', displayName: 'OpenAI', icon: '🤖', models: ['gpt-4o', 'gpt-4', 'gpt-3.5-turbo'] },
      { name: 'anthropic', displayName: 'Anthropic', icon: '🧠', models: ['claude-3-5-sonnet', 'claude-3-opus'] },
      { name: 'deepseek', displayName: 'DeepSeek', icon: '🔮', models: ['deepseek-chat', 'deepseek-coder'] },
      { name: 'qwen', displayName: '通义千问', icon: '🌟', models: ['qwen-turbo', 'qwen-plus', 'qwen-max'] }
    ]

    // 初始化 UI
    function initUI() {
      const providersDiv = document.getElementById('providers')
      const providerSelect = document.getElementById('providerSelect')
      
      providersDiv.innerHTML = providers.map(p => 
        `<span class="provider-badge">${p.icon} ${p.displayName}</span>`
      ).join('')

      providerSelect.innerHTML = '<option value="">请选择...</option>' + 
        providers.map(p => `<option value="${p.name}">${p.icon} ${p.displayName}</option>`).join('')
    }

    // 更新模型列表
    window.updateModels = function() {
      const provider = document.getElementById('providerSelect').value
      const modelSelect = document.getElementById('modelSelect')
      const providerInfo = providers.find(p => p.name === provider)
      
      if (providerInfo) {
        modelSelect.innerHTML = providerInfo.models.map(m => 
          `<option value="${m}">${m}</option>`
        ).join('')
      } else {
        modelSelect.innerHTML = '<option value="">请先配置供应商...</option>'
      }
    }

    document.getElementById('providerSelect').addEventListener('change', window.updateModels)

    // 保存配置 (模拟)
    window.saveConfig = function() {
      const provider = document.getElementById('providerSelect').value
      const apiKey = document.getElementById('apiKey').value
      
      if (!provider || !apiKey) {
        showStatus('configStatus', '请选择供应商并输入 API Key', 'error')
        return
      }

      // 保存到 localStorage
      const configs = JSON.parse(localStorage.getItem('llm-hub:configs') || '{}')
      configs[provider] = { apiKey, updatedAt: Date.now() }
      localStorage.setItem('llm-hub:configs', JSON.stringify(configs))
      
      showStatus('configStatus', `✅ ${provider} 配置已保存`, 'success')
    }

    // 发送对话 (模拟)
    window.sendChat = function() {
      const provider = document.getElementById('providerSelect').value
      const model = document.getElementById('modelSelect').value
      const message = document.getElementById('message').value
      
      if (!provider || !model || !message) {
        showStatus('chatStatus', '请完成配置并输入消息', 'error')
        return
      }

      const output = document.getElementById('output')
      output.textContent = `[${provider}/${model}]\n用户: ${message}\n\n助手: (需要集成 llm-hub SDK 进行实际调用)`
      showStatus('chatStatus', '提示: 请通过 npm 安装 llm-hub 并使用构建工具集成', 'info')
    }

    // 流式发送 (模拟)
    window.sendChatStream = function() {
      const output = document.getElementById('output')
      output.textContent = '流式输出模拟: '
      
      const text = '你好！我是一个 AI 助手，很高兴为你服务。'
      let i = 0
      
      const interval = setInterval(() => {
        if (i < text.length) {
          output.textContent += text[i]
          i++
        } else {
          clearInterval(interval)
        }
      }, 50)
    }

    function showStatus(elementId, message, type) {
      const element = document.getElementById(elementId)
      element.innerHTML = `<div class="status ${type}">${message}</div>`
      setTimeout(() => element.innerHTML = '', 3000)
    }

    initUI()
  </script>
</body>
</html>
